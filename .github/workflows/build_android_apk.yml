name: Build Android APK

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

jobs:
  build-android:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            git \
            zip \
            unzip \
            openjdk-17-jdk \
            libffi-dev \
            libssl-dev \
            liblzma-dev \
            libbz2-dev \
            libreadline-dev \
            zlib1g-dev

      - name: Install Buildozer and Python tools
        run: |
          python -m pip install --upgrade pip
          pip install buildozer cython

      - name: Initialize Buildozer spec (if missing)
        run: |
          if [ ! -f buildozer.spec ]; then
            buildozer init
            sed -i 's/^title =.*/title = Nexus Vision/' buildozer.spec
            sed -i 's/^package.name =.*/package.name = nexusvision/' buildozer.spec
            sed -i 's/^package.domain =.*/package.domain = org.nexus.vision/' buildozer.spec
            sed -i 's/^requirements =.*/requirements = python3,kivy,kivymd/' buildozer.spec
          fi

      - name: Build Android debug APK
        env:
          BUILDOZER_WARN_ON_ROOT: "1"
        run: |
          buildozer -v android debug

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: nexus-vision-debug-apk
          path: bin/*.apk

