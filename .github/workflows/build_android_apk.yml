name: Build Nexus Radar
on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Install Critical Dependencies
        run: |
          sudo apt-get update
          # هذه المكتبات هي المسؤولة عن تشغيل Aidl وأدوات الأندرويد
          sudo apt-get install -y git zip unzip openjdk-17-jdk autoconf libtool pkg-config \
          zlib1g-dev libncurses5-dev libncursesw5-dev libtinfo5 cmake libffi-dev libssl-dev \
          libsdl2-dev libsdl2-image-dev libsdl2-mixer-dev libsdl2-ttf-dev build-essential

      - name: Install Buildozer & Cython
        run: |
          python -m pip install --upgrade pip
          pip install "Cython<3.0" buildozer 

      - name: Build APK
        env:
          BUILDOZER_WARN_ON_ROOT: '0'
          APP_ANDROID_ACCEPT_SDK_LICENSE: '1'
        run: |
          # تنظيف جذري قبل البدء
          rm -rf .buildozer
          rm -f buildozer.spec
          
          # إنشاء إعدادات نظيفة للرادار
          buildozer init
          sed -i 's/^requirements =.*/requirements = python3,kivy==2.3.0,kivymd==1.2.0/' buildozer.spec
          sed -i 's/^android.archs =.*/android.archs = arm64-v8a/' buildozer.spec
          sed -i 's/^android.api =.*/android.api = 33/' buildozer.spec
          
          # تشغيل البناء
          yes | buildozer -v android debug

      - name: Upload APK
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: Nexus-Radar-Package
          path: bin/*.apk
