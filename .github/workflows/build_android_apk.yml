name: Build Android APK
on: [push]

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11' # رفعنا النسخة لضمان التوافق مع NDK الحديث

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Install System Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y git zip unzip openjdk-17-jdk autoconf libtool pkg-config \
          zlib1g-dev libncurses5-dev libncursesw5-dev libtinfo5 cmake libffi-dev libssl-dev \
          libsdl2-dev libsdl2-image-dev libsdl2-mixer-dev libsdl2-ttf-dev

      - name: Install Buildozer & Cython
        run: |
          python -m pip install --upgrade pip
          pip install "Cython<3.0" buildozer 

      - name: Build APK
        env:
          BUILDOZER_WARN_ON_ROOT: '0'
          APP_ANDROID_ACCEPT_SDK_LICENSE: '1'
        run: |
          export PATH="$HOME/.local/bin:$PATH"
          # أمر سحري: مسح أي إعدادات قديمة وبدء بناء نظيف تماماً
          rm -rf .buildozer
          # سنبني لمعمارية واحدة أولاً لضمان النجاح السريع
          yes | buildozer -v android debug 2>&1 | tee build.log

      - name: Upload APK
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: NexusVision-Final-APK
          path: |
            bin/*.apk
            build.log
          
