name: Build Android APK
on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Install Android Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y git zip unzip openjdk-17-jdk autoconf libtool pkg-config \
          zlib1g-dev libncurses5-dev libncursesw5-dev libtinfo5 cmake libffi-dev libssl-dev \
          libsdl2-dev libsdl2-image-dev libsdl2-mixer-dev libsdl2-ttf-dev

      - name: Install Buildozer & Cython
        run: |
          python -m pip install --upgrade pip
          pip install "Cython<3.0" buildozer 

      - name: Build APK
        env:
          BUILDOZER_WARN_ON_ROOT: '0'
          APP_ANDROID_ACCEPT_SDK_LICENSE: '1'
        run: |
          # تنظيف وبدء بناء الرادار الجديد
          rm -rf .buildozer
          if [ ! -f buildozer.spec ]; then
            buildozer init
            sed -i 's/^requirements =.*/requirements = python3,kivy==2.3.0,kivymd==1.2.0/' buildozer.spec
            sed -i 's/^android.archs =.*/android.archs = arm64-v8a/' buildozer.spec
          fi
          # تشغيل البناء مع تفعيل سجلات كاملة
          buildozer -v android debug 2>&1 | tee build.log

      - name: Upload Artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: Nexus-Radar-Package
          path: |
            bin/*.apk
            build.log
