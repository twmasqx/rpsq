name: Build Nexus
on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17' # هذا السطر هو مفتاح الحل

      - name: Install Tools
        run: |
          sudo apt update
          sudo apt install -y git zip unzip autoconf libtool pkg-config zlib1g-dev libncurses5-dev libncursesw5-dev libtinfo5 cmake libffi-dev libssl-dev
          pip install --upgrade pip
          pip install "Cython<3.0" buildozer

      - name: Build APK
        run: |
          # حذف أي إعدادات قديمة لبدء بناء نظيف تماماً
          rm -rf .buildozer
          rm -f buildozer.spec
          buildozer init
          # إعدادات الرادار البسيطة
          sed -i 's/^requirements =.*/requirements = python3,kivy==2.3.0,kivymd==1.2.0/' buildozer.spec
          sed -i 's/^android.archs =.*/android.archs = arm64-v8a/' buildozer.spec
          sed -i 's/^android.api =.*/android.api = 33/' buildozer.spec
          # أمر البناء المباشر
          buildozer -v android debug
          
      - name: Upload
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: Nexus-Radar-Final
          path: bin/*.apk
